<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0F0F0F"/>
  <!-- Red YouTube-style play button -->
  <rect x="4" y="8" width="16" height="11" rx="2" fill="#FF0000"/>
  <!-- Play triangle -->
  <polygon points="9,11 9,16 14,13.5" fill="white"/>
  <!-- Chat bubble lines (right side) -->
  <rect x="22" y="9" width="7" height="1.5" rx="0.75" fill="#60A5FA"/>
  <rect x="22" y="12" width="5" height="1.5" rx="0.75" fill="#4ADE80"/>
  <rect x="22" y="15" width="6" height="1.5" rx="0.75" fill="#A78BFA"/>
  <!-- Bottom chat line -->
  <rect x="4" y="22" width="25" height="1.5" rx="0.75" fill="#374151"/>
  <rect x="4" y="25" width="18" height="1.5" rx="0.75" fill="#374151"/>
  <rect x="4" y="28" width="21" height="1.5" rx="0.75" fill="#374151"/>
</svg>
